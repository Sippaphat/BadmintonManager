name: badmintonmanager

services:
  backend:
    build:
      context: /DATA/AppData/Web/BadmintonManager
      dockerfile: Dockerfile.backend
    container_name: badminton-api
    restart: unless-stopped
    environment:
      CORS_ORIGIN: "https://badminton.xenocer.com,http://localhost:9009,http://localhost:5173"
      GOOGLE_CLIENT_ID: "634347628772-ot3d906un0ar1oq5p3b98tci67l99non.apps.googleusercontent.com"
    volumes:
      - /DATA/AppData/Web/BadmintonManager/server/uploads:/app/server/uploads
    ports:
      - "5000:5000"
    networks:
      - appnet

  frontend:
    build:
      context: /DATA/AppData/Web/BadmintonManager
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: "https://badminton-api.xenocer.com"
    container_name: badminton-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "9009:9009"
    networks:
      - appnet

  cloudflared-be:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-badminton-be
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      TZ: Asia/Bangkok
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARED_TOKEN_BE}
    networks:
      - appnet

  cloudflared-fe:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-badminton-fe
    restart: unless-stopped
    depends_on:
      - frontend
    environment:
      TZ: Asia/Bangkok
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARED_TOKEN_FE}
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
